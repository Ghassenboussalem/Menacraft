<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>InstaGrab</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <div class="header-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="5" stroke="url(#igGrad)" stroke-width="2"/>
        <circle cx="12" cy="12" r="5" stroke="url(#igGrad)" stroke-width="2"/>
        <circle cx="17.5" cy="6.5" r="1.5" fill="url(#igGrad)"/>
        <defs>
          <linearGradient id="igGrad" x1="2" y1="22" x2="22" y2="2">
            <stop stop-color="#F58529"/>
            <stop offset="0.5" stop-color="#DD2A7B"/>
            <stop offset="1" stop-color="#8134AF"/>
          </linearGradient>
        </defs>
      </svg>
      <h1>InstaGrab</h1>
    </div>
    <span class="header-badge">v1.0</span>
  </header>

  <!-- Status Bar -->
  <div id="status-bar" class="status-bar hidden">
    <div class="status-icon"></div>
    <span class="status-text"></span>
  </div>

  <!-- Not on Instagram Warning -->
  <div id="not-instagram" class="state-panel hidden">
    <div class="empty-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
        <path d="M12 9v4M12 17h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h2>Not on Instagram</h2>
    <p>Navigate to an Instagram post or reel to start scraping.</p>
    <p class="hint">Example: instagram.com/p/ABC123</p>
  </div>

  <!-- Main Content -->
  <main id="main-content" class="hidden">
    <!-- Action Buttons -->
    <div class="actions-row">
      <button id="btn-scrape" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Scrape Post
      </button>
      <button id="btn-save" class="btn btn-success" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2"/>
          <polyline points="17,21 17,13 7,13 7,21" stroke="currentColor" stroke-width="2"/>
          <polyline points="7,3 7,8 15,8" stroke="currentColor" stroke-width="2"/>
        </svg>
        Save to DB
      </button>
    </div>

    <!-- Preview Card -->
    <div id="preview-card" class="preview-card hidden">
      <div class="preview-header">
        <div class="preview-avatar" id="preview-avatar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#aaa" stroke-width="2"/>
            <circle cx="12" cy="7" r="4" stroke="#aaa" stroke-width="2"/>
          </svg>
        </div>
        <div class="preview-user-info">
          <span class="preview-username" id="preview-username">—</span>
          <span class="preview-date" id="preview-date">—</span>
        </div>
      </div>

      <div class="preview-image-container" id="preview-image-container">
        <div class="preview-image-placeholder">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="2" stroke="#555" stroke-width="1.5"/>
            <circle cx="8.5" cy="8.5" r="1.5" fill="#555"/>
            <path d="M21 15l-5-5L5 21" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <img id="preview-image" class="preview-image hidden" alt="Post image">
      </div>

      <div class="preview-stats">
        <div class="stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z" stroke="#ef4444" stroke-width="2" fill="#ef444433"/>
          </svg>
          <span id="preview-likes">—</span>
        </div>
        <div class="stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z" stroke="#3b82f6" stroke-width="2" fill="#3b82f633"/>
          </svg>
          <span id="preview-comments">—</span>
        </div>
        <div class="stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <line x1="4" y1="9" x2="20" y2="9" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
            <line x1="4" y1="15" x2="14" y2="15" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span id="preview-hashtags">—</span>
        </div>
      </div>

      <div class="preview-caption" id="preview-caption">
        <p class="caption-text">No caption extracted yet.</p>
      </div>
    </div>

    <!-- Raw JSON Toggle -->
    <button id="btn-toggle-json" class="btn btn-ghost hidden">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <polyline points="16,18 22,12 16,6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <polyline points="8,6 2,12 8,18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      View Raw JSON
    </button>
    <pre id="json-output" class="json-output hidden"></pre>

    <!-- Copy / Download -->
    <div id="export-row" class="actions-row hidden">
      <button id="btn-copy" class="btn btn-outline">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/>
        </svg>
        Copy JSON
      </button>
      <button id="btn-download" class="btn btn-outline">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="currentColor" stroke-width="2"/>
          <polyline points="7,10 12,15 17,10" stroke="currentColor" stroke-width="2"/>
          <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2"/>
        </svg>
        Download
      </button>
    </div>
  </main>

  <!-- History Panel -->
  <div id="history-section" class="history-section">
    <button id="btn-toggle-history" class="btn btn-ghost full-width">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
        <polyline points="12,6 12,12 16,14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Recent Saves (<span id="history-count">0</span>)
    </button>
    <div id="history-list" class="history-list hidden"></div>
  </div>

  <!-- Footer -->
  <footer>
    <span>Powered by <strong>Supabase</strong></span>
    <span class="dot">·</span>
    <span id="db-status" class="db-indicator">
      <span class="db-dot"></span> Connected
    </span>
  </footer>

  <script src="supabase-config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
